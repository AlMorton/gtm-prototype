<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM Prototype — Contact</title>
  <meta name="description" content="Contact form for testing GTM form-submit events." />
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Tag Manager -->
  <!-- TODO: replace GTM-XXXXXXX with your real container ID (find/replace across all .html files) -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>

</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header class="site-header">
    <a class="brand" href="index.html">GTM Prototype</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-intro">
      <h1>Contact</h1>
      <p>Submit this form to push a <code>form_submit</code> event to the dataLayer. Nothing is actually sent anywhere — it's purely for testing your GTM trigger.</p>
    </section>

    <section class="form-section">
      <form id="contact-form" novalidate>
        <label>
          Name
          <input type="text" name="name" id="name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" id="email" required />
        </label>
        <label>
          Message
          <textarea name="message" id="message" rows="4" required></textarea>
        </label>
        <button type="submit" class="btn">Send</button>
        <p id="form-status" class="form-status" hidden>Thanks! A <code>form_submit</code> event was pushed to the dataLayer.</p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>GTM Prototype · built for testing</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
